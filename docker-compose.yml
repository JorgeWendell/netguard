services:
  db:
    image: postgres:16-alpine
    container_name: netguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lucas120908}
      POSTGRES_DB: ${POSTGRES_DB:-netguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-netuser} -d ${POSTGRES_DB:-netguard}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - netguard-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: netguard-migrate
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lucas120908}
      POSTGRES_DB: ${POSTGRES_DB:-netguard}
      DATABASE_URL: postgresql://${POSTGRES_USER:-netuser}:${POSTGRES_PASSWORD:-lucas120908}@db:5432/${POSTGRES_DB:-netguard}
    command: ["npm", "run", "db:push"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - netguard-network
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://netguard.adelbr.tech}
    container_name: netguard-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-netuser}:${POSTGRES_PASSWORD:-lucas120908}@db:5432/${POSTGRES_DB:-netguard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-3L8AKwGUZa+VMTQc472p2FqT0UTyfNG8aBgAH+LfSMw=}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://netguard.adelbr.tech}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://netguard.adelbr.tech}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-info@adelbr.tech}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-info@adelbr.tech}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - netguard-network
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.netguard.rule=Host(`${APP_DOMAIN:-netguard.adelbr.tech}`)
      - traefik.http.routers.netguard.entrypoints=websecure
      - traefik.http.routers.netguard.tls=true
      - traefik.http.routers.netguard.tls.certresolver=letsencrypt
      - traefik.http.routers.netguard.service=netguard
      - traefik.http.services.netguard.loadbalancer.server.port=3000
      - traefik.http.routers.netguard-http.rule=Host(`${APP_DOMAIN:-netguard.adelbr.tech}`)
      - traefik.http.routers.netguard-http.entrypoints=web
      - traefik.http.routers.netguard-http.middlewares=netguard-https-redirect
      - traefik.http.middlewares.netguard-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.netguard-https-redirect.redirectscheme.permanent=true

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: netguard-worker
    restart: unless-stopped
    command: ["npm", "run", "worker:mikrotik"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-netuser}:${POSTGRES_PASSWORD:-lucas120908}@db:5432/${POSTGRES_DB:-netguard}
      WAN_PING_TARGET: ${WAN_PING_TARGET:-1.1.1.1}
      WAN_PING_COUNT: ${WAN_PING_COUNT:-3}
      MIKROTIK_WORKER_TICK_MS: ${MIKROTIK_WORKER_TICK_MS:-30000}
      MIKROTIK_STATUS_POLL_INTERVAL_SECONDS: ${MIKROTIK_STATUS_POLL_INTERVAL_SECONDS:-30}
      MIKROTIK_METRICS_INTERVAL_SECONDS: ${MIKROTIK_METRICS_INTERVAL_SECONDS:-600}
      DASHBOARD_REFRESH_INTERVAL_SECONDS: ${DASHBOARD_REFRESH_INTERVAL_SECONDS:-30}
      MIKROTIK_WORKER_CONCURRENCY: ${MIKROTIK_WORKER_CONCURRENCY:-8}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - netguard-network

  caddy:
    profiles: ["with-caddy"]
    image: caddy:2-alpine
    container_name: netguard-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - netguard-network

networks:
  netguard-network:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
