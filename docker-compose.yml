services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lucas120908}
      POSTGRES_DB: ${POSTGRES_DB:-netguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-netuser} -d ${POSTGRES_DB:-netguard}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - netguard

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    command: ["npm", "run", "db:push"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - netguard

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://netguard.adelbr.tech}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - netguard

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    env_file: .env
    command: ["npm", "run", "worker:mikrotik"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - netguard

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - netguard

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  netguard:
    driver: bridge
